apiVersion: apps/v1
kind: Deployment
metadata:
  name: go-web-app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: go-web-app
  template:
    metadata:
      labels:
        app: go-web-app
    spec:
      containers:
        - name: go-web-app
          image: your-docker-image:latest
          ports:
            - containerPort: 8080
          resources:
            requests:
              cpu: "250m"       # guarantees 0.25 CPU
              memory: "128Mi"   # guarantees 128 MB RAM
            limits:
              cpu: "500m"       # max 0.5 CPU
              memory: "256Mi"   # max 256 MB RAM
